<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - ServiceHub</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">ServiceHub</div>
        <div class="nav-links">
            <a href="dashboard-customer.html">Dashboard</a>
            <a href="bookings.html">My Bookings</a>
            <a href="profile.html" class="active">Profile</a>
            <a href="#" id="logoutBtn">Logout</a>
        </div>
    </nav>

    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <ul class="sidebar-menu">
                <li><a href="dashboard-customer.html"><i class="fas fa-home"></i> Overview</a></li>
                <li><a href="bookings.html"><i class="fas fa-calendar-alt"></i> My Bookings</a></li>
                <li><a href="profile.html" class="active"><i class="fas fa-user"></i> Profile</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <h2 class="mb-4">My Profile</h2>

            <div class="profile-header">
                <div class="profile-avatar" id="profileAvatar">
                    <!-- Initials will be inserted here -->
                </div>
                <div>
                    <h3 id="profileName">User Name</h3>
                    <p class="text-muted" id="profileEmail">user@example.com</p>
                    <span class="status-badge accepted" id="profileRole">Customer</span>
                </div>
            </div>

            <div class="card mb-4">
                <h3 class="mb-4">Account Details</h3>
                <form id="profileForm">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="editName" class="form-control" readonly>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="editEmail" class="form-control" readonly>
                    </div>
                    <div class="form-group">
                        <label>Member Since</label>
                        <input type="text" id="joinedDate" class="form-control" readonly>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = Auth.getCurrentUser();
            if (user) {
                // Update Header
                document.getElementById('profileName').innerText = user.name;
                document.getElementById('profileEmail').innerText = user.email;
                document.getElementById('profileRole').innerText = user.role.charAt(0).toUpperCase() + user.role.slice(1);

                // Update Avatar
                const initials = user.name.split(' ').map(n => n[0]).join('').toUpperCase();
                document.getElementById('profileAvatar').innerText = initials.substring(0, 2);

                // Update Form
                document.getElementById('editName').value = user.name;
                document.getElementById('editEmail').value = user.email;
                document.getElementById('joinedDate').value = App.formatDate(user.joinedDate);
            }
        });
    </script>
</body>
</html>
